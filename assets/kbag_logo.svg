  <!-- Handle -->
  <path d="M45 42 L45 30 C45 18.5 53.5 10 64 10 C74.5 10 83 18.5 83 30 L83 42"
        stroke="url(#kbag-handle)" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Bag body: top zone -->
  <path d="M31 36 C31 33 33 31 36 31 L92 31 C95 31 97 33 97 36 L106 132 C106.5 137 102.5 141 97.5 141 L30.5 141 C25.5 141 21.5 137 22 132 Z"
        fill="url(#kbag-top)"/>

  <!-- Bottom zone with curved seam -->
  <g clip-path="url(#kbag-body)">
    <path d="M14 96 C42 106 84 84 114 94 L114 148 L14 148 Z" fill="url(#kbag-bottom)"/>
    <path d="M14 96 C42 106 84 84 114 94" stroke="#FFD37A" stroke-width="1.6" fill="none" opacity="0.9"/>

