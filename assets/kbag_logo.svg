      <path d="M52 50 L63 50 L60 86 L58 108 L47 108 L50 74 Z" fill="#E8430A"/>
      <path d="M84 50 L96 50 L70 79 L60 86 L62 68 Z" fill="#E8430A"/>
    </g>
    <!-- White brush stroke: lower leg of the K -->
    <path d="M60 82 C66 88 74 96 84 101 C88 103 92 104 95 104 C92 108 86 109 80 107 C70 103 61 95 55 87 C56 84 58 82 60 82 Z"
          fill="#FFFFFF"/>
    <path d="M55 87 C58 83 60 82 63 84 L58 92 Z" fill="#FFFFFF"/>
  </g>

  <!-- Sparkles -->
  <path d="M97 102 L99.4 111.6 L109 114 L99.4 116.4 L97 126 L94.6 116.4 L85 114 L94.6 111.6 Z" fill="#FFFFFF"/>
  <path d="M88 90 L89.4 95 L94.4 96.4 L89.4 97.8 L88 102.8 L86.6 97.8 L81.6 96.4 L86.6 95 Z" fill="#FFFFFF" opacity="0.95"/>
  <path d="M104 88 L105 91.4 L108.4 92.4 L105 93.4 L104 96.8 L103 93.4 L99.6 92.4 L103 91.4 Z" fill="#FFF3D6" opacity="0.9"/>
  <circle cx="93" cy="129" r="1.6" fill="#FFFFFF" opacity="0.85"/>
</svg>
