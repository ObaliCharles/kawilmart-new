<svg xmlns="http://www.w3.org/2000/svg" width="128" height="148" viewBox="0 0 128 148" fill="none">
  <defs>
    <linearGradient id="kbag-top" x1="64" y1="34" x2="64" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A2A"/>
      <stop offset="1" stop-color="#FF5A12"/>
    </linearGradient>
    <linearGradient id="kbag-bottom" x1="64" y1="88" x2="64" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB3A0A"/>
      <stop offset="1" stop-color="#F42405"/>
    </linearGradient>
    <linearGradient id="kbag-handle" x1="64" y1="6" x2="64" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4560A"/>
      <stop offset="1" stop-color="#E8430A"/>
    </linearGradient>
    <clipPath id="kbag-body">
      <path d="M31 36 C31 33 33 31 36 31 L92 31 C95 31 97 33 97 36 L106 132 C106.5 137 102.5 141 97.5 141 L30.5 141 C25.5 141 21.5 137 22 132 Z"/>
