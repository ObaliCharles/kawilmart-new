<svg xmlns="http://www.w3.org/2000/svg" width="128" height="148" viewBox="0 0 128 148" fill="none">
  <defs>
    <linearGradient id="kbag-body" x1="64" y1="40" x2="64" y2="141" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8228"/>
      <stop offset="0.55" stop-color="#FF5211"/>
      <stop offset="1" stop-color="#F42A06"/>
    </linearGradient>
    <linearGradient id="kbag-handle" x1="64" y1="9" x2="64" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F05310"/>
      <stop offset="1" stop-color="#E2430C"/>
    </linearGradient>
    <clipPath id="kbag-clip">
      <path d="M36 40 L92 40 C94.8 40 97.1 42.1 97.4 44.9 L104.6 132.4 C105 136.9 101.5 140.8 97 140.8 L31 140.8 C26.5 140.8 23 136.9 23.4 132.4 L30.6 44.9 C30.9 42.1 33.2 40 36 40 Z"/>
    </clipPath>
  </defs>

  <!-- Handle (behind the bag) -->
  <path d="M49 44 L49 28.5 C49 17.2 55.6 9 64 9 C72.4 9 79 17.2 79 28.5 L79 44"
        stroke="url(#kbag-handle)" stroke-width="9.5" stroke-linecap="round" fill="none"/>

  <!-- Bag body -->
  <path d="M36 40 L92 40 C94.8 40 97.1 42.1 97.4 44.9 L104.6 132.4 C105 136.9 101.5 140.8 97 140.8 L31 140.8 C26.5 140.8 23 136.9 23.4 132.4 L30.6 44.9 C30.9 42.1 33.2 40 36 40 Z"
        fill="url(#kbag-body)"/>

  <g clip-path="url(#kbag-clip)">
    <!-- Slightly deeper red below the seam -->
    <path d="M18 98 C44 107 88 100 110 91.5 L114 148 L14 148 Z" fill="#F22505" opacity="0.35"/>
    <!-- Thin gold seam line, dipping in the middle -->
    <path d="M18 98 C44 107 88 100 110 91.5" stroke="#FFDFA0" stroke-width="1.7" fill="none" opacity="0.95"/>

    <!-- Black K: slanted stem + upper arm, rounded terminals -->
    <path d="M66.5 53 L58 103" stroke="#0C0B10" stroke-width="12" stroke-linecap="round"/>
    <path d="M63 79.5 L86.5 54" stroke="#0C0B10" stroke-width="11.5" stroke-linecap="round"/>

    <!-- White brush-stroke lower leg: chunky wave nestled in the joint,
         tapering to a pointed, up-flicked tip -->
    <path d="M64.5 73.5
             C67 81 71.5 87.5 78 91.4
             C83 94.3 88.3 94.4 92.8 91.2
             C92.4 97.6 86.8 102.2 79.6 101.2
             C69.6 99.7 61.6 90.4 59.4 79.6
             C60.8 76.4 62.4 74.3 64.5 73.5 Z"
          fill="#FFFDF6"/>
  </g>

  <!-- Big black sparkle: tall 4-point star with concave sides -->
  <path d="M91.5 84 Q93 103 104.5 106.5 Q93 110 91.5 134 Q90 110 78.5 106.5 Q90 103 91.5 84 Z" fill="#0C0B10"/>
  <!-- Small black 4-point star -->
  <path d="M72.5 109.5 Q73.6 115.6 79 117.2 Q73.6 118.8 72.5 125 Q71.4 118.8 66 117.2 Q71.4 115.6 72.5 109.5 Z" fill="#0C0B10"/>

  <!-- Tiny white sparkles around the big star -->
  <path d="M97.5 87.5 Q98.2 91.6 101.2 92.5 Q98.2 93.4 97.5 97.5 Q96.8 93.4 93.8 92.5 Q96.8 91.6 97.5 87.5 Z" fill="#FFFFFF"/>
  <path d="M99.5 101.5 Q99.9 103.9 101.7 104.4 Q99.9 104.9 99.5 107.3 Q99.1 104.9 97.3 104.4 Q99.1 103.9 99.5 101.5 Z" fill="#FFFFFF" opacity="0.95"/>
  <path d="M81.5 122.5 Q82 125.2 84.2 125.8 Q82 126.4 81.5 129 Q81 126.4 78.8 125.8 Q81 125.2 81.5 122.5 Z" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="95.5" cy="112.5" r="1.1" fill="#FFFFFF" opacity="0.85"/>
</svg>
